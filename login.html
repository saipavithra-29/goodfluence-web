<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Goodfluence</title>
    <link rel="stylesheet" href="css/style.css">
</head>


<script src="js/script.js"></script>


<body>
    <nav class="navbar">
        <!-- logo -->
         <a href="index.html" class="logo">Goodfluence</a>
    </nav>
    <main>
        <!-- left side content -->
        <section class="left-section">
            <h1>Welcome Back!</h1>
            <h2>Continue Your Journey</h2>
        </section>

        <!-- right side content -->
        <section class="right-section">
            <form class="login-form">

                <label for="email">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="Enter your email..">

                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password"
                    placeholder="Enter your password..">

                    <div class="options">
                        <div class="remember">
                            <input
                                type="checkbox"
                                id="remember">
                            <label for="remember">
                                Remember Me
                            </label>
                        </div>
                    <a href="#">
                        Forgot Password?
                    </a>
                </div>

                <button class="btn btn-primary" type="submit">Sign In</button>

                <p class="register-text">
                    Don't have an account?
                    <a href="register.html">
                        Start Your Journey
                    </a>
                </p>

            </form>
        </section>
    </main>
    <footer>
        <!-- footer -->
         &copy; 2026 Goodfluence
    </footer>
</body>
</html>
